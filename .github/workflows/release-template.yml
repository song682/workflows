name: Release Template

on:
  workflow_call:
    inputs:
      mod_archives_name:
        description: 'Mod archives name from gradle.properties'
        required: true
        type: string
      mc_version:
        description: 'Minecraft version (e.g., 1.7.10)'
        required: true
        type: string
    secrets:
      CURSEFORGE_TOKEN:
        required: false
      CURSEFORGE_PROJECT_ID:
        required: false
      MODRINTH_TOKEN:
        required: false
      MODRINTH_PROJECT_ID:
        required: false

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      mod-name: ${{ steps.extract-version.outputs.mod-name }}
      release-type: ${{ steps.determine-type.outputs.release-type }}
      should-release: ${{ steps.determine-type.outputs.should-release }}
      is-snapshot: ${{ steps.determine-type.outputs.is-snapshot }}
    steps:
      - uses: actions/checkout@v6

      - name: Locate Tags.java automatically
        id: locate-tags
        run: |
          FILE=$(find . -type f -name "Tags.java" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "Tags.java not found!"
            exit 1
          fi
          echo "tags-path=$FILE" >> $GITHUB_OUTPUT
          echo "Found Tags.java at: $FILE"

      - name: Extract version and mod name from Tags.java
        id: extract-version
        run: |
          FILE="${{ steps.locate-tags.outputs.tags-path }}"
          VERSION=$(grep -oP 'VERSION = "\K[^"]+' "$FILE")
          MOD_NAME=$(grep -oP 'NAME = "\K[^"]+' "$FILE")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "mod-name=${MOD_NAME}" >> $GITHUB_OUTPUT
          echo "Version detected: ${VERSION}"
          echo "Mod name detected: ${MOD_NAME}"

      - name: Determine release type
        id: determine-type
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"

