name: Release Template

on:
  workflow_call:
    inputs:
      tags_file_path:
        description: 'Path to Tags.java file'
        required: true
        type: string
      mod_archives_name:
        description: 'Mod archives name from gradle.properties'
        required: true
        type: string
      mc_version:
        description: 'Minecraft version (e.g., 1.7.10)'
        required: true
        type: string
    secrets:
      CURSEFORGE_TOKEN:
        required: false
      CURSEFORGE_PROJECT_ID:
        required: false
      MODRINTH_TOKEN:
        required: false
      MODRINTH_PROJECT_ID:
        required: false

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      mod-name: ${{ steps.extract-version.outputs.mod-name }}
      release-type: ${{ steps.determine-type.outputs.release-type }}
      should-release: ${{ steps.determine-type.outputs.should-release }}
      is-snapshot: ${{ steps.determine-type.outputs.is-snapshot }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Extract version and mod name from Tags.java
        id: extract-version
        run: |
          VERSION=$(grep -oP 'VERSION = "\K[^"]+' "${{ inputs.tags_file_path }}")
          MOD_NAME=$(grep -oP 'NAME = "\K[^"]+' "${{ inputs.tags_file_path }}")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "mod-name=${MOD_NAME}" >> $GITHUB_OUTPUT
          echo "Version detected: ${VERSION}"
          echo "Mod name detected: ${MOD_NAME}"
      
      - name: Determine release type
        id: determine-type
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          
          # Check if version contains snapshot indicator
          if [[ $VERSION =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            # Format: X.X.X.N (snapshot)
            IS_SNAPSHOT="true"
            BASE_VERSION="${BASH_REMATCH[1]}"
          elif [[ $VERSION =~ ^([0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
            # Format: X.X.X-SNAPSHOT or similar
            IS_SNAPSHOT="true"
            BASE_VERSION="${BASH_REMATCH[1]}"
          else
            IS_SNAPSHOT="false"
            BASE_VERSION="$VERSION"
          fi
          
          # Auto-detect from version
          if [ "$IS_SNAPSHOT" = "true" ]; then
            RELEASE_TYPE="snapshot"
          else
            MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
            MINOR=$(echo $BASE_VERSION | cut -d. -f2)
            
            if [ "$MAJOR" -eq 0 ]; then
              if [ "$MINOR" -lt 5 ]; then
                RELEASE_TYPE="alpha"
              else
                RELEASE_TYPE="beta"
              fi
            else
              RELEASE_TYPE="release"
            fi
          fi
          
          # Determine if should release to CurseForge/Modrinth (only for official releases)
          if [ "$RELEASE_TYPE" = "release" ] && [ "$IS_SNAPSHOT" = "false" ]; then
            SHOULD_RELEASE="true"
          else
            SHOULD_RELEASE="false"
          fi
          
          echo "release-type=${RELEASE_TYPE}" >> $GITHUB_OUTPUT
          echo "should-release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
          echo "is-snapshot=${IS_SNAPSHOT}" >> $GITHUB_OUTPUT
          echo "Release type: ${RELEASE_TYPE}"
          echo "Should release to platforms: ${SHOULD_RELEASE}"

  build:
    runs-on: ubuntu-latest
    needs: check-version
    outputs:
      jar-files: ${{ steps.build-output.outputs.jar-files }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 7.4
        name: Set up Gradle
      
      - name: Fix line endings
        run: sed -i 's/\r$//' gradlew
      
      - name: Add permission
        run: chmod +x ./gradlew
      
      - name: Execute Gradle build
        run: ./gradlew build
      
      - name: Output jar files
        id: build-output
        run: |
          JAR_FILES=$(find build/libs -name "*.jar" -type f | tr '\n' ' ')
          echo "jar-files=${JAR_FILES}" >> $GITHUB_OUTPUT
          echo "JARs found: ${JAR_FILES}"

  generate-changelog:
    runs-on: ubuntu-latest
    needs: check-version
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get the last release tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # No previous tag, get all commits
            COMMITS=$(git log --pretty=format:"%B" | head -20)
          else
            # Get commits since last tag
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%B")
          fi
          
          # Parse commits into categories
          ADD_ITEMS=""
          FIX_ITEMS=""
          DEPRECATED_ITEMS=""
          
          while IFS= read -r line; do
            if [ -z "$line" ]; then
              continue
            fi
            
            # Convert to lowercase for keyword matching
            LINE_LOWER=$(echo "$line" | tr '[:upper:]' '[:lower:]')
            
            # Check for Fix keywords
            if echo "$LINE_LOWER" | grep -qE "fix|fixed|bug|resolve|issue|problem"; then
              FIX_ITEMS="$FIX_ITEMS- $line"$'\n'
            # Check for Add keywords
            elif echo "$LINE_LOWER" | grep -qE "add|new|implement|feature|create"; then
              ADD_ITEMS="$ADD_ITEMS- $line"$'\n'
            # Check for Deprecated keywords
            elif echo "$LINE_LOWER" | grep -qE "remove|removed|deprecated|drop"; then
              DEPRECATED_ITEMS="$DEPRECATED_ITEMS- $line"$'\n'
            fi
          done <<< "$COMMITS"
          
          # Build changelog
          CHANGELOG="### ➕Add:"$'\n'
          if [ -z "$ADD_ITEMS" ]; then
            CHANGELOG="$CHANGELOG    - No new features"$'\n'
          else
            CHANGELOG="$CHANGELOG    $ADD_ITEMS"
          fi
          
          CHANGELOG="$CHANGELOG"$'\n'"### 🔧Fix:"$'\n'
          if [ -z "$FIX_ITEMS" ]; then
            CHANGELOG="$CHANGELOG    - No fixes"$'\n'
          else
            CHANGELOG="$CHANGELOG    $FIX_ITEMS"
          fi
          
          CHANGELOG="$CHANGELOG"$'\n'"### ❗❗❗Deprecated:"$'\n'
          if [ -z "$DEPRECATED_ITEMS" ]; then
            CHANGELOG="$CHANGELOG    - No deprecations"$'\n'
          else
            CHANGELOG="$CHANGELOG    $DEPRECATED_ITEMS"
          fi
          
          # Use delimiter for multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  github-release:
    runs-on: ubuntu-latest
    needs: [check-version, build, generate-changelog]
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate release title and notes
        id: release-info
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          MOD_NAME="${{ needs.check-version.outputs.mod-name }}"
          RELEASE_TYPE="${{ needs.check-version.outputs.release-type }}"
          IS_SNAPSHOT="${{ needs.check-version.outputs.is-snapshot }}"
          MC_VERSION="${{ inputs.mc_version }}"
          
          # Generate release title
          if [ "$IS_SNAPSHOT" = "true" ]; then
            RELEASE_TITLE="${MC_VERSION} - ${VERSION} - Snapshot"
          else
            RELEASE_TITLE="${MC_VERSION} - ${VERSION} - ${RELEASE_TYPE^}"
          fi
          
          echo "title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          echo "Release title: ${RELEASE_TITLE}"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.release-info.outputs.title }}
          tag_name: v${{ needs.check-version.outputs.version }}
          files: ${{ needs.build.outputs.jar-files }}
          draft: false
          prerelease: ${{ needs.check-version.outputs.is-snapshot == 'true' || needs.check-version.outputs.release-type != 'release' }}
          body: |
            # ${{ needs.check-version.outputs.mod-name }} - ${{ needs.check-version.outputs.version }}
            
            ## What is changed?
            Change version number from previous to `${{ needs.check-version.outputs.version }}`
            
            ${{ needs.generate-changelog.outputs.changelog }}
            
            ## Notes
            Full Changelog: https://github.com/${{ github.repository }}/commits/v${{ needs.check-version.outputs.version }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  platform-release:
    runs-on: ubuntu-latest
    needs: [check-version, build, generate-changelog]
    if: needs.check-version.outputs.should-release == 'true'
    steps:
      - uses: actions/checkout@v6
      
      - name: Prepare release notes
        id: release-notes
        run: |
          CHANGELOG="${{ needs.generate-changelog.outputs.changelog }}"
          
          # Use delimiter for multiline output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          echo "# ${{ needs.check-version.outputs.mod-name }} - ${{ needs.check-version.outputs.version }}"$'\n' >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
      
      - name: Release to CurseForge
        if: secrets.CURSEFORGE_TOKEN != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          file_path: ${{ needs.build.outputs.jar-files }}
          project_id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          release_type: release
          changelog: ${{ steps.release-notes.outputs.content }}
          changelog_type: markdown
        continue-on-error: true
      
      - name: Release to Modrinth
        if: secrets.MODRINTH_TOKEN != ''
        uses: Kode/modrinth-modpack-action@v0.5.4
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          mod_id: ${{ secrets.MODRINTH_PROJECT_ID }}
          files: |
            ${{ needs.build.outputs.jar-files }}
          name: ${{ needs.check-version.outputs.mod-name }} ${{ needs.check-version.outputs.version }}
          version_number: ${{ needs.check-version.outputs.version }}
          version_type: release
          changelog: ${{ steps.release-notes.outputs.content }}
          loaders: |
            forge
          game_versions: |
            ${{ inputs.mc_version }}
        continue-on-error: true

  cleanup:
    runs-on: ubuntu-latest
    needs: [check-version, github-release, platform-release]
    if: always()
    steps:
      - name: Release Summary
        run: |
          echo "## ✅ Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Mod Name**: ${{ needs.check-version.outputs.mod-name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.check-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type**: ${{ needs.check-version.outputs.release-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Is Snapshot**: ${{ needs.check-version.outputs.is-snapshot }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform Release**: ${{ needs.check-version.outputs.should-release }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release**: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
