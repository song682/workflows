name: Build mod jar

on:
  workflow_dispatch:
    inputs:
      native-sources:
        description: 'Artifact name containing pre-built JNI natives'
        required: false
        type: string
        default: ''
      gradle-version:
        description: 'Gradle version to use (e.g., 7.4, 8.0)'
        required: false
        type: string
        default: '7.4'
  workflow_call:
    inputs:
      native-sources:
        description: 'Artifact name containing pre-built JNI natives'
        required: false
        type: string
        default: ''
      gradle-version:
        description: 'Gradle version to use (e.g., 7.4, 8.0)'
        required: false
        type: string
        default: '7.4'
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: Download JNI natives (from called workflow)
        if: inputs.native-sources != ''
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.native-sources }}
          path: .
      
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ inputs.gradle-version || '7.4' }}
        name: Set up Gradle
        
      - name: Add permission
        run: chmod +x ./gradlew
      
      - name: Execute Gradle build
        run: ./gradlew build
      
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v5
        with:
          path: build/libs
