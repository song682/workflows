name: Auto Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - beta
          - alpha
          - snapshot
  push:
    branches:
      - main
    paths:
      - 'src/main/java/**/Tags.java'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      mod-name: ${{ steps.extract-version.outputs.mod-name }}
      release-type: ${{ steps.determine-type.outputs.release-type }}
      should-release: ${{ steps.determine-type.outputs.should-release }}
      is-snapshot: ${{ steps.determine-type.outputs.is-snapshot }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Extract version and mod name from Tags.java
        id: extract-version
        run: |
          VERSION=$(grep -oP 'VERSION = "\K[^"]+' src/main/java/decok/dfcdvadstf/createworldui/Tags.java)
          MOD_NAME=$(grep -oP 'NAME = "\K[^"]+' src/main/java/decok/dfcdvadstf/createworldui/Tags.java)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "mod-name=${MOD_NAME}" >> $GITHUB_OUTPUT
          echo "Version detected: ${VERSION}"
          echo "Mod name detected: ${MOD_NAME}"
      
      - name: Determine release type
        id: determine-type
        run: |
          VERSION="${{ steps.extract-version.outputs.version }}"
          MANUAL_TYPE="${{ github.event.inputs.release_type }}"
          
          # Check if version contains snapshot indicator
          if [[ $VERSION =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.([0-9]+)$ ]]; then
            # Format: X.X.X.N (snapshot)
            IS_SNAPSHOT="true"
            SNAPSHOT_NUM="${BASH_REMATCH[2]}"
            BASE_VERSION="${BASH_REMATCH[1]}"
          elif [[ $VERSION =~ ^([0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
            # Format: X.X.X-SNAPSHOT or similar
            IS_SNAPSHOT="true"
            BASE_VERSION="${BASH_REMATCH[1]}"
          else
            IS_SNAPSHOT="false"
            BASE_VERSION="$VERSION"
          fi
          
          # Determine type based on version if not manually specified
          if [ "$MANUAL_TYPE" != "" ]; then
            RELEASE_TYPE="$MANUAL_TYPE"
          else
            # Auto-detect from version
            if [ "$IS_SNAPSHOT" = "true" ]; then
              RELEASE_TYPE="snapshot"
            else
              MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
              MINOR=$(echo $BASE_VERSION | cut -d. -f2)
              
              if [ "$MAJOR" -eq 0 ]; then
                if [ "$MINOR" -lt 5 ]; then
                  RELEASE_TYPE="alpha"
                else
                  RELEASE_TYPE="beta"
                fi
              else
                RELEASE_TYPE="release"
              fi
            fi
          fi
          
          # Determine if should release to CurseForge/Modrinth (only for official releases)
          if [ "$RELEASE_TYPE" = "release" ] && [ "$IS_SNAPSHOT" = "false" ]; then
            SHOULD_RELEASE="true"
          else
            SHOULD_RELEASE="false"
          fi
          
          echo "release-type=${RELEASE_TYPE}" >> $GITHUB_OUTPUT
          echo "should-release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
          echo "is-snapshot=${IS_SNAPSHOT}" >> $GITHUB_OUTPUT
          echo "Release type: ${RELEASE_TYPE}"
          echo "Should release to platforms: ${SHOULD_RELEASE}"

  build:
    runs-on: ubuntu-latest
    needs: check-version
    outputs:
      jar-path: ${{ steps.build-output.outputs.jar-path }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
      
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 7.4
        name: Set up Gradle
      
      - name: Fix line endings
        run: sed -i 's/\r$//' gradlew
      
      - name: Add permission
        run: chmod +x ./gradlew
      
      - name: Execute Gradle build
        run: ./gradlew build
      
      - name: Output jar path
        id: build-output
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" -type f | head -1)
          echo "jar-path=${JAR_PATH}" >> $GITHUB_OUTPUT
          echo "JAR found at: ${JAR_PATH}"

  github-release:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate release title and notes
        id: release-info
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          MOD_NAME="${{ needs.check-version.outputs.mod-name }}"
          RELEASE_TYPE="${{ needs.check-version.outputs.release-type }}"
          IS_SNAPSHOT="${{ needs.check-version.outputs.is-snapshot }}"
          
          # Minecraft version for 1.7.10
          MC_VERSION="1.7.10"
          
          # Generate release title
          if [ "$IS_SNAPSHOT" = "true" ]; then
            RELEASE_TITLE="${MC_VERSION} - ${VERSION} - Snapshot"
          else
            RELEASE_TITLE="${MC_VERSION} - ${VERSION} - ${RELEASE_TYPE^}"
          fi
          
          echo "title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT
          echo "Release title: ${RELEASE_TITLE}"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.release-info.outputs.title }}
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            build/libs/*.jar
          draft: false
          prerelease: ${{ needs.check-version.outputs.is-snapshot == 'true' || needs.check-version.outputs.release-type != 'release' }}
          body: |
            # ${{ needs.check-version.outputs.mod-name }} - ${{ needs.check-version.outputs.version }}
            
            Please refer to `release-notes.md` for detailed changelog.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  platform-release:
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.should-release == 'true'
    steps:
      - uses: actions/checkout@v6
      
      - name: Download release notes template
        id: release-notes
        run: |
          if [ -f "release-notes.md" ]; then
            NOTES=$(cat release-notes.md)
            # Use delimiter to handle multiline
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "content<<$EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          else
            echo "content=Release ${{ needs.check-version.outputs.version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Release to CurseForge
        if: secrets.CURSEFORGE_TOKEN != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          file_path: ${{ needs.build.outputs.jar-path }}
          project_id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          release_type: release
          changelog: ${{ steps.release-notes.outputs.content }}
          changelog_type: markdown
        continue-on-error: true
      
      - name: Release to Modrinth
        if: secrets.MODRINTH_TOKEN != ''
        uses: Kode/modrinth-modpack-action@v0.5.4
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          mod_id: ${{ secrets.MODRINTH_PROJECT_ID }}
          files: |
            ${{ needs.build.outputs.jar-path }}
          name: ${{ needs.check-version.outputs.mod-name }} ${{ needs.check-version.outputs.version }}
          version_number: ${{ needs.check-version.outputs.version }}
          version_type: release
          changelog: ${{ steps.release-notes.outputs.content }}
          loaders: |
            forge
          game_versions: |
            1.7.10
        continue-on-error: true

  cleanup:
    runs-on: ubuntu-latest
    needs: [github-release, platform-release]
    if: always()
    steps:
      - uses: actions/checkout@v6
      
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.check-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Mod Name**: ${{ needs.check-version.outputs.mod-name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Type**: ${{ needs.check-version.outputs.release-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Is Snapshot**: ${{ needs.check-version.outputs.is-snapshot }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform Release**: ${{ needs.check-version.outputs.should-release }}" >> $GITHUB_STEP_SUMMARY
